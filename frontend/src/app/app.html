<div class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">COMP 3133 Assignment 2</p>
      <h1>Employee Management Frontend</h1>
    </div>

    <nav class="nav-links">
      @if (sessionService.isAuthenticated()) {
        <a routerLink="/employees" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Employees
        </a>
        <button type="button" class="logout-button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/signup" routerLinkActive="active">Signup</a>
      }
    </nav>
  </header>

  <main class="content-panel">
    <router-outlet />
  </main>
</div>
